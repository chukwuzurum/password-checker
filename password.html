<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1e293b;
  padding: 2rem;
  border-radius: 10px;
  width: 320px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}

#strength-bar {
  height: 10px;
  border-radius: 5px;
  margin-top: 10px;
  background: gray;
}

#message {
  margin-top: 10px;
  font-size: 14px;
}

.rules {
  font-size: 12px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Password Strength Checker </h2>

  <input type="password" id="password" placeholder="Enter password" oninput="checkPassword()">

  <div id="strength-bar"></div>
  <p id="message"></p>

  <div class="rules">
    <br>✔ At least 8 characters</br>
    <br>✔ Uppercase letter</br>
    <br>✔ Number</br>
    <br>✔ Special character</br>
  </div>
</div>

<script>
function checkPassword() {
  const password = document.getElementById("password").value;
  const bar = document.getElementById("strength-bar");
  const message = document.getElementById("message");

  let strength = 0;

  if (password.length >= 8) strength++;
  if (/[A-Z]/.test(password)) strength++;
  if (/[0-9]/.test(password)) strength++;
  if (/[^A-Za-z0-9]/.test(password)) strength++;

  if (strength === 1) {
    bar.style.background = "red";
    bar.style.width = "25%";
    message.textContent = "Weak Password";
  } 
  else if (strength === 2 || strength === 3) {
    bar.style.background = "orange";
    bar.style.width = "60%";
    message.textContent = "Medium Password";
  } 
  else if (strength === 4) {
    bar.style.background = "green";
    bar.style.width = "100%";
    message.textContent = "Strong Password";
  } 
  else {
    bar.style.width = "0%";
    message.textContent = "";
  }
}
</script>

</body>
</html>
